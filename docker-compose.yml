version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gade_ams_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ams_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gade_ams_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ams_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:stable
    container_name: gade_ams_clamav
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - ams_net
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s  # ClamAV loads its DB on first start — give it time

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: gade_ams_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-7d}
      TOTP_ISSUER: "Gade AMS"
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
      STORAGE_PATH: /app/storage
    volumes:
      - file_storage:/app/storage
    networks:
      - ams_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: gade_ams_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: /api
      NODE_ENV: ${NODE_ENV:-production}
    networks:
      - ams_net

  nginx:
    image: nginx:1.25-alpine
    container_name: gade_ams_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - ams_net

  certbot:
    image: certbot/certbot:latest
    container_name: gade_ams_certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      certbot certonly --webroot --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL}
      --agree-tos --no-eff-email
      -d ${DOMAIN}
    profiles:
      - certbot  # Run only when: docker compose --profile certbot up certbot

volumes:
  postgres_data:
  redis_data:
  clamav_data:
  file_storage:
  certbot_webroot:

networks:
  ams_net:
    driver: bridge
